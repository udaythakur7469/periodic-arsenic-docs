<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1020" />
      <stop offset="1" stop-color="#111827" />
    </linearGradient>

    <linearGradient id="accent" x1="32" y1="32" x2="224" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#8B5CF6" />
      <stop offset="1" stop-color="#6366F1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="12" y="12" width="232" height="232" rx="40" fill="url(#bg)" />

  <!-- Border -->
  <rect
    x="14"
    y="14"
    width="228"
    height="228"
    rx="38"
    stroke="url(#accent)"
    stroke-width="3"
    opacity="0.9"
  />

  <!-- As Text -->
  <text
    x="128"
    y="108"
    text-anchor="middle"
    fill="white"
    font-family="Inter, Arial, sans-serif"
    font-size="78"
    font-weight="700"
    letter-spacing="-4"
  >
    As
  </text>

  <!-- Divider -->
  <line
    x1="72"
    y1="138"
    x2="184"
    y2="138"
    stroke="#3B82F6"
    stroke-opacity="0.35"
    stroke-width="2"
  />

  <!-- 33 Text -->
  <text
    x="128"
    y="198"
    text-anchor="middle"
    fill="#8B5CF6"
    font-family="Inter, Arial, sans-serif"
    font-size="74"
    font-weight="800"
    letter-spacing="-4"
  >
    33
  </text>
</svg>